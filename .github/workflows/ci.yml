name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm build

      - name: Link CLI globally
        run: |
          cd packages/cli
          pnpm link --global

      - name: Verify package
        run: pnpm verify

      - name: Run product regression
        env:
          HARNESS_TEST_DIR: /tmp/harness-test
        run: pnpm check:product
